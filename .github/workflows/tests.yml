name: tests

# Run the stdlib unittest suite on every push and PR so the ingestion watcher,
# highlight generator, Cosmos tagger, and status writer stay green.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
